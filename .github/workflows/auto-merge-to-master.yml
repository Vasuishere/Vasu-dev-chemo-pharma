name: Auto-merge Dev → Master on Success

on:
  pull_request:
    branches:
      - master
    types: [opened, synchronize]

jobs:
  check-and-merge:
    if: contains(github.head_ref, 'dev') && contains(github.event.pull_request.labels.*.name, 'automated')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Wait for status checks
        uses: actions/github-script@v7
        with:
          script: |
            const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));
            let retries = 0;
            const maxRetries = 30; // 5 minutes with 10 second intervals

            while (retries < maxRetries) {
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number
              });

              if (pr.mergeable === null) {
                console.log('Merge status being computed, waiting...');
                await sleep(10000);
                retries++;
                continue;
              }

              if (pr.mergeable === false) {
                throw new Error('PR has conflicts and cannot be merged');
              }

              const { data: checks } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: context.payload.pull_request.head.sha
              });

              const allPassed = checks.check_runs.every(check =>
                check.conclusion === 'success' || check.conclusion === null
              );

              if (allPassed && checks.check_runs.length > 0) {
                console.log('✅ All checks passed');
                return true;
              }

              if (checks.check_runs.every(check => check.conclusion !== null)) {
                throw new Error('Some checks failed');
              }

              console.log('Waiting for checks to complete...');
              await sleep(10000);
              retries++;
            }

            throw new Error('Checks did not complete in time');

      - name: Auto-merge PR
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              merge_method: 'squash',
              commit_title: 'chore: merge dev → master (automated)',
              commit_message: 'Automated merge from dev branch. All quality checks passed.'
            });
            console.log('✅ PR auto-merged successfully');
