name: Master Branch - Production Ready Check

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  production-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies in manufact-clone
        working-directory: ./manufact-clone
        run: npm ci

      - name: Run linter
        working-directory: ./manufact-clone
        run: npm run lint

      - name: Build project
        working-directory: ./manufact-clone
        run: npm run build

      - name: Run health check
        working-directory: ./manufact-clone
        run: npm run health:check

      - name: Check robots.txt
        working-directory: ./manufact-clone
        run: npm run seo:check-robots

      - name: Verify no breaking changes
        run: |
          echo "✓ Production build validated"
          echo "✓ All quality gates passed"
          echo "✓ Ready for deployment to domain"

  notify-deployment-ready:
    needs: production-validation
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && success()
    runs-on: ubuntu-latest

    steps:
      - name: Log deployment readiness
        run: |
          echo "🚀 Master branch is production-ready"
          echo "✅ All checks passed"
          echo "📦 Ready to deploy to your domain"
          echo "⏰ $(date)"
